<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}QA Form{% endblock %}</title>
    <style>
        body { 
            background-color: #f9f9f9; 
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 50px; 
        }
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .header { 
            text-align: center;
            border-bottom: 2px solid #eee; 
            margin-bottom: 25px; 
            padding-bottom: 15px; 
        }
        /* Стили для навигации */
        .top-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }
        .hamburger-btn {
            width: 20px;
            height: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            background: transparent; /* Полностью прозрачный фон */
            border: none;
            padding: 15px;
            margin: -15px;
            box-sizing: content-box;
        }
        .hamburger-btn span {
            display: block;
            height: 2px;          /* Толщина линий */
            width: 100%;
            background-color: #444; /* Цвет линий (темно-серый, как на фото) */
            border-radius: 3px;
            transition: 0.3s;     /* Плавность при наведении */
        }

    /* Эффект при наведении на всю зону dropdown */
        .dropdown:hover .hamburger-btn span {
            background-color: #000; /* Линии становятся чуть чернее при наведении */
        }

        .dropdown { 
            position: relative; 
            display: inline-block;
         }
        .dropdown-content {
            display: none;
            position: absolute;
            top: 30px; /* Отступ вниз от иконки */
            left: 0;
            background-color: #ffffff;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        .dropdown-content a {
            color: #333;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
            transition: 0.2s;
        }
        .dropdown-content a:hover { 
            background-color: #f5f5f5; 
            color: #007bff;
        }
        .dropdown:hover .dropdown-content { 
            display: block; 
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #666;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; 
        }
        input[readonly] {
            background-color: #f0f0f0; 
            color: #999;
            cursor: not-allowed;
        }
        button { 
            width: 100%;
            padding: 12px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px;
            cursor: pointer; 
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            border: 1px solid transparent;
        }
        .alert-danger {
            background-color: #fce8e8;
            border-color: #ff5555;
            color: #fb4141;
        }
        /* Зеленая плашка (успех) */
        .alert-success {
            background-color: #e6f4ea;
            border-color: #c3e6cb;
            color: #067a21;
        }
        .result-list {
            margin: 10px 0 0 0;
            padding-left: 20px;
            font-size: 0.9em;
        }
        .progress-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin: 15px 0;
            height: 24px;
            position: relative;
            overflow: hidden;
            border: 1px solid #ccc;
        }
        .progress-bar {
            height: 100%;
            background-color: #4CAF50;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            color: #333; 
            font-size: 13px;
            font-weight: bold;
            z-index: 2;
            text-shadow: 0 0 2px rgba(255,255,255,0.8); 
        }
        .success-message {
            color: #155724;
            background-color: #d4edda;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #c3e6cb;
            margin: 15px 0;
            font-weight: bold;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        

    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="dropdown">
            <div class="hamburger-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="dropdown-content">
                <a href="{% url 'main' %}">Главная</a>
                <a href="{% url 'detector' %}">Детектор багов</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
